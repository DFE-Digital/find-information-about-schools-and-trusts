name: Run automated UI and accessibility tests
run-name: UI tests for '${{ inputs.environment }}' - `${{ inputs.branch-name }}`

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      branch-name:
        required: true
        type: string
    secrets:
      BASE_URL:
        required: true
      TEST_OVERRIDE_CYPRESS_TEST_SECRET:
        required: true
      TEAMS_WEBHOOK_URL:
        required: true
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to run tests against'
        required: true
        type: environment

concurrency:
  group: ${{ github.workflow }}

env:
  NODE_VERSION: '20'
  WORKING_DIRECTORY: tests/DFE.FindInformationAcademiesTrusts.CypressTests

jobs:
  cypress-tests:
    name: Run Cypress Tests (${{ matrix.group }})
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - group: regression-search-and-general
            browser: "edge"
            spec: |
              cypress/e2e/regression/search/**/*.cy.ts
              cypress/e2e/regression/*.cy.ts
              cypress/e2e/regression/navigation/general/*.cy.ts
          - group: regression-navigation-and-school-routing
            browser: "edge"
            spec: |
              cypress/e2e/regression/navigation/trust/trust-navigation-core.cy.ts
              cypress/e2e/regression/navigation/school/schools-navigation.cy.ts
              cypress/e2e/regression/navigation/school/school-routing.cy.ts
              cypress/e2e/regression/manageProjectAndCases/overview.cy.ts
          - group: regression-trusts-contacts-financial
            browser: "edge"
            spec: |
              cypress/e2e/regression/trusts/trust-contacts-page.cy.ts
              cypress/e2e/regression/trusts/financial-docs.cy.ts
          - group: regression-trusts-governance-ofsted-routing
            browser: "edge"
            spec: |
              cypress/e2e/regression/trusts/governance-page.cy.ts
              cypress/e2e/regression/trusts/ofsted-page.cy.ts
              cypress/e2e/regression/navigation/trust/trust-routing.cy.ts
          - group: regression-trusts-academies-overview
            browser: "edge"
            spec: |
              cypress/e2e/regression/trusts/trustAcademiesPage/*.cy.ts
              cypress/e2e/regression/trusts/overview-page.cy.ts
              cypress/e2e/regression/trusts/data-download-trust.cy.ts
          - group: regression-schools
            browser: "edge"
            spec: |
              cypress/e2e/regression/schools/**/*.cy.ts
          - group: accessibility-all
            browser: "edge"
            spec: |
              cypress/e2e/accessibility/**/*.cy.ts
    container:
      image: cypress/browsers:22.21.0@sha256:1b0e8df630f819b84ae8f46e39746ac79e3e1666208a1d0716b2e07ccafd19a9
    defaults:
      run:
        working-directory: tests/DFE.FindInformationAcademiesTrusts.CypressTests
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.ref }}

      - name: Setup Cypress environment
        run: |
          mkdir -p cypress/downloads
          mkdir -p cypress/accessibility
          mkdir -p cypress/accessibility/audit-reports
          mkdir -p cypress/screenshots
          chmod -R 755 cypress/

      - name: Run
        uses: cypress-io/github-action@v6
        env:
          CYPRESS_URL: ${{ secrets.BASE_URL }}
          CYPRESS_AUTH_KEY: ${{ secrets.TEST_OVERRIDE_CYPRESS_TEST_SECRET }}
        with:
          browser: ${{ matrix.browser }}
          spec: ${{ matrix.spec }}
          working-directory: tests/DFE.FindInformationAcademiesTrusts.CypressTests
          wait-on: ${{ secrets.BASE_URL }}

      - name: Upload screenshots
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: screenshots-${{ inputs.environment }}-${{ matrix.group }}
          path: tests/DFE.FindInformationAcademiesTrusts.CypressTests/cypress/screenshots
          retention-days: 5
          if-no-files-found: ignore

      - name: Prepare test results
        id: prepare-results
        if: always()
        run: |
          mkdir -p cypress/reports/merged
          if [ -d "cypress/reports/mocha" ] && [ "$(find cypress/reports/mocha -name '*.json' 2>/dev/null | wc -l)" -gt 0 ]; then
            for file in cypress/reports/mocha/*.json; do
              filename=$(basename "$file")
              cp "$file" "cypress/reports/merged/${{ matrix.group }}-$filename"
            done
            echo "results_found=true" >> $GITHUB_OUTPUT
          else
            echo '{"stats":{"suites":0,"tests":0,"passes":0,"pending":0,"failures":0,"start":"","end":"","duration":0}}' > "cypress/reports/merged/${{ matrix.group }}-placeholder.json"
            echo "results_found=false" >> $GITHUB_OUTPUT
          fi

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: test-results-${{ matrix.group }}
          path: tests/DFE.FindInformationAcademiesTrusts.CypressTests/cypress/reports/merged/*.json
          retention-days: 1

      - name: Upload accessibility reports
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: a11y-reports-${{ inputs.environment }}-${{ matrix.group }}
          path: tests/DFE.FindInformationAcademiesTrusts.CypressTests/cypress/accessibility
          if-no-files-found: ${{ matrix.group == 'a11y-comprehensive' && 'error' || 'warn' }}

  generate-report:
    name: Generate Combined Report
    needs: cypress-tests
    if: always()
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: ${{ env.WORKING_DIRECTORY }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: npm ci --ignore-scripts

      - name: Download all test results
        uses: actions/download-artifact@v4
        with:
          pattern: test-results-*
          path: ${{ env.WORKING_DIRECTORY }}/cypress/reports/mocha
          merge-multiple: true

      - name: Generate combined HTML report
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: |
          mkdir -p mochareports
          npm run generate:html:report

      - name: Upload combined report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: cypress-report-${{ inputs.environment }}
          path: ${{ env.WORKING_DIRECTORY }}/mochareports
          retention-days: 30

      - name: Report results to Teams
        if: always()
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: node scripts/send-teams-notification.js
        env:
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
          ENVIRONMENT: ${{ inputs.environment }}
          INFORMATION_LINK: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
